<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pola Aliran Sungai Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .river-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .river-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .river-card.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        .svg-container {
            background-color: #e2e8f0;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 py-6 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl text-white">
                    <i class="fa-solid fa-route"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 leading-none">RIVER<span class="text-blue-600">PATTERN</span></h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Hidrosfer & Geomorfologi</p>
                </div>
            </div>
            <nav class="flex gap-6 text-sm font-bold uppercase tracking-widest">
                <button onclick="switchTab('materi')" id="tab-materi" class="text-blue-600 border-b-2 border-blue-600 pb-1">Katalog Pola</button>
                <button onclick="switchTab('kuis')" id="tab-kuis" class="text-slate-400 hover:text-blue-600 transition pb-1">Uji Pemahaman</button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        
        <!-- SECTION: MATERI -->
        <section id="sec-materi" class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- List Pola Aliran -->
            <div class="lg:col-span-5 space-y-4">
                <h2 class="text-2xl font-black text-slate-900 mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-list-check text-blue-600"></i> Jenis Pola Aliran
                </h2>
                
                <div id="pattern-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Dinamis via JS -->
                </div>
            </div>

            <!-- Detail Display -->
            <div class="lg:col-span-7">
                <div id="detail-panel" class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 min-h-[550px] flex flex-col sticky top-32">
                    <div id="placeholder" class="m-auto text-center space-y-4 py-20">
                        <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                            <i class="fa-solid fa-water text-3xl"></i>
                        </div>
                        <h3 class="text-xl font-bold">Pilih Jenis Pola</h3>
                        <p class="text-slate-500 max-w-xs mx-auto text-sm">Klik salah satu pola aliran di samping untuk mempelajari karakteristik geologisnya.</p>
                    </div>

                    <div id="content-display" class="hidden animate-in fade-in slide-in-from-right-4 duration-500 space-y-8">
                        <div class="flex justify-between items-start">
                            <div>
                                <span id="d-badge" class="badge bg-blue-100 text-blue-700 mb-2 inline-block">Kategori</span>
                                <h3 id="d-title" class="text-3xl font-black text-slate-900">Nama Pola</h3>
                            </div>
                            <div class="p-3 bg-slate-50 rounded-2xl">
                                <i id="d-icon" class="fa-solid fa-mountain text-2xl text-slate-400"></i>
                            </div>
                        </div>

                        <!-- Mini SVG Visualization -->
                        <div id="d-viz" class="w-full h-48 bg-slate-50 rounded-3xl flex items-center justify-center overflow-hidden border border-slate-100">
                            <!-- SVG Content will be injected here -->
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-3">
                                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Karakteristik</h4>
                                <p id="d-desc" class="text-sm text-slate-600 leading-relaxed"></p>
                            </div>
                            <div class="space-y-3">
                                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Kondisi Geologi</h4>
                                <div id="d-geo" class="p-4 bg-blue-50 rounded-2xl border border-blue-100 text-sm font-semibold text-blue-800">
                                    Informasi geologi.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION: KUIS -->
        <section id="sec-kuis" class="hidden max-w-3xl mx-auto">
            <div id="quiz-box" class="bg-white rounded-[3rem] p-12 shadow-2xl border border-slate-100">
                <!-- Quiz via JS -->
            </div>
        </section>

    </main>

    <script>
        const riverPatterns = [
            {
                id: 'dendritic',
                name: 'Dendritik',
                category: 'Umum',
                icon: 'fa-share-nodes',
                desc: 'Pola yang menyerupai percabangan pohon atau urat daun. Anak sungai bergabung dengan sungai utama pada sudut lancip.',
                geo: 'Terbentuk di daerah dengan struktur batuan homogen (seragam) dan lereng yang landai.',
                viz: `<svg viewBox="0 0 200 120" class="w-48 h-auto"><path d="M100 120 V80 L140 50 M100 80 L60 40 M140 50 L160 20 M140 50 L120 10 M60 40 L40 10 M60 40 L80 15" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`
            },
            {
                id: 'trellis',
                name: 'Trellis',
                category: 'Struktural',
                icon: 'fa-grip-lines',
                desc: 'Anak sungai mengalir sejajar dan bergabung dengan sungai utama pada sudut siku-siku (90 derajat).',
                geo: 'Terdapat di daerah dengan perlapisan batuan sedimen yang terlipat (antiklin & sinklin) dengan kekerasan berbeda.',
                viz: `<svg viewBox="0 0 200 120" class="w-48 h-auto"><path d="M20 60 H180 M50 20 V60 M50 100 V60 M100 20 V60 M100 100 V60 M150 20 V60 M150 100 V60" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`
            },
            {
                id: 'rectangular',
                name: 'Rectangular',
                category: 'Struktural',
                icon: 'fa-vector-square',
                desc: 'Sungai yang memiliki lekukan tajam membentuk sudut 90 derajat, mengikuti retakan permukaan.',
                geo: 'Terbentuk di daerah yang memiliki banyak patahan (fault) atau kekar (joint) pada batuan dasar.',
                viz: `<svg viewBox="0 0 200 120" class="w-48 h-auto"><path d="M40 20 V60 H100 V40 H160 V100" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`
            },
            {
                id: 'parallel',
                name: 'Paralel',
                category: 'Topografis',
                icon: 'fa-equals',
                desc: 'Sungai-sungai yang mengalir sejajar satu sama lain mengikuti kemiringan lereng yang curam.',
                geo: 'Biasanya ditemukan pada lereng gunung yang sangat curam atau daerah pesisir yang baru terangkat.',
                viz: `<svg viewBox="0 0 200 120" class="w-48 h-auto" style="transform: rotate(45deg)"><path d="M40 20 V100 M80 20 V100 M120 20 V100 M160 20 V100" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`
            },
            {
                id: 'radial_centrifugal',
                name: 'Radial Sentrifugal',
                category: 'Gunung',
                icon: 'fa-expand',
                desc: 'Aliran sungai yang menyebar keluar dari satu titik pusat ketinggian.',
                geo: 'Terbentuk di puncak gunung berapi yang berbentuk kerucut (cone) atau kubah (dome).',
                viz: `<svg viewBox="0 0 200 120" class="w-48 h-auto"><circle cx="100" cy="60" r="5" fill="#3b82f6"/><path d="M100 55 V10 M100 65 V110 M105 60 H150 M95 60 H50 M104 56 L130 30 M96 56 L70 30 M104 64 L130 90 M96 64 L70 90" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`
            },
            {
                id: 'radial_centripetal',
                name: 'Radial Sentripetal',
                category: 'Cekungan',
                icon: 'fa-compress',
                desc: 'Aliran sungai yang mengalir menuju satu titik pusat berupa cekungan atau danau.',
                geo: 'Terbentuk di daerah basin, kaldera, atau cekungan tertutup lainnya.',
                viz: `<svg viewBox="0 0 200 120" class="w-48 h-auto"><circle cx="100" cy="60" r="15" fill="none" stroke="#3b82f6" stroke-dasharray="2 2"/><path d="M100 10 V40 M100 110 V80 M30 60 H70 M170 60 H130" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrow)"/></svg>`
            },
            {
                id: 'annular',
                name: 'Annular',
                category: 'Kubah',
                icon: 'fa-circle-notch',
                desc: 'Pola aliran melingkar yang mengikuti struktur batuan yang melingkar.',
                geo: 'Terbentuk pada struktur kubah (dome) yang sudah tererosi lanjut sehingga menyingkap lapisan batuan lunak dan keras secara bergantian.',
                viz: `<svg viewBox="0 0 200 120" class="w-48 h-auto"><path d="M60 60 A40 40 0 1 1 140 60 A40 40 0 1 1 60 60 M40 60 A60 60 0 1 1 160 60" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`
            }
        ];

        // RENDER LIST
        function initApp() {
            const list = document.getElementById('pattern-list');
            riverPatterns.forEach(p => {
                const item = document.createElement('div');
                item.className = 'river-card bg-white p-5 rounded-2xl border border-slate-200 flex items-center gap-4 shadow-sm';
                item.onclick = () => selectPattern(p.id, item);
                item.innerHTML = `
                    <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center text-blue-500">
                        <i class="fa-solid ${p.icon} text-lg"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-900">${p.name}</h4>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">${p.category}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                `;
                list.appendChild(item);
            });
        }

        function selectPattern(id, element) {
            document.querySelectorAll('.river-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            const p = riverPatterns.find(x => x.id === id);
            document.getElementById('placeholder').classList.add('hidden');
            const display = document.getElementById('content-display');
            display.classList.remove('hidden');

            document.getElementById('d-title').innerText = p.name;
            document.getElementById('d-badge').innerText = p.category;
            document.getElementById('d-desc').innerText = p.desc;
            document.getElementById('d-geo').innerText = p.geo;
            document.getElementById('d-viz').innerHTML = p.viz;
            
            const iconEl = document.getElementById('d-icon');
            iconEl.className = `fa-solid ${p.icon} text-2xl text-slate-400`;
        }

        function switchTab(tab) {
            document.getElementById('sec-materi').classList.toggle('hidden', tab !== 'materi');
            document.getElementById('sec-kuis').classList.toggle('hidden', tab !== 'kuis');
            
            document.getElementById('tab-materi').className = tab === 'materi' ? 'text-blue-600 border-b-2 border-blue-600 pb-1' : 'text-slate-400 hover:text-blue-600 transition pb-1';
            document.getElementById('tab-kuis').className = tab === 'kuis' ? 'text-blue-600 border-b-2 border-blue-600 pb-1' : 'text-slate-400 hover:text-blue-600 transition pb-1';

            if(tab === 'kuis') initQuiz();
        }

        // --- QUIZ LOGIC ---
        const questions = [
            { q: "Pola aliran sungai yang ditemukan pada daerah dengan batuan homogen dan lereng landai adalah...", a: ["Radial", "Trellis", "Dendritik", "Annular"], c: 2 },
            { q: "Di daerah patahan atau retakan batuan, sungai cenderung membentuk pola...", a: ["Rectangular", "Paralel", "Sentripetal", "Dendritik"], c: 0 },
            { q: "Pola aliran yang menyebar dari puncak gunung api ke segala arah disebut...", a: ["Radial Sentripetal", "Radial Sentrifugal", "Annular", "Trellis"], c: 1 },
            { q: "Pola Trellis biasanya mencirikan daerah dengan struktur geologi berupa...", a: ["Cekungan Basin", "Puncak Gunung Berapi", "Lipatan (Antiklin/Sinklin)", "Batuan Homogen"], c: 2 }
        ];

        let qIdx = 0;
        let score = 0;

        function initQuiz() {
            qIdx = 0; score = 0;
            renderQuiz();
        }

        function renderQuiz() {
            const box = document.getElementById('quiz-box');
            if(qIdx >= questions.length) {
                box.innerHTML = `
                    <div class="text-center space-y-6">
                        <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-graduation-cap text-4xl"></i>
                        </div>
                        <h2 class="text-3xl font-black">Hasil Evaluasi</h2>
                        <div class="text-6xl font-black text-slate-900">${(score/questions.length)*100}</div>
                        <p class="text-slate-500 italic">"Pola aliran sungai adalah cermin dari apa yang ada di bawah permukaan bumi."</p>
                        <button onclick="switchTab('materi')" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">Belajar Kembali</button>
                    </div>
                `;
                return;
            }

            const q = questions[qIdx];
            box.innerHTML = `
                <div class="space-y-8">
                    <div class="flex justify-between items-center">
                        <span class="badge bg-slate-100 text-slate-600">Pertanyaan ${qIdx+1}/${questions.length}</span>
                        <div class="h-2 w-32 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500" style="width: ${(qIdx/questions.length)*100}%"></div>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 leading-relaxed">${q.q}</h3>
                    <div class="grid grid-cols-1 gap-4">
                        ${q.a.map((opt, i) => `
                            <button onclick="checkAnswer(${i})" class="w-full text-left p-5 border-2 border-slate-100 rounded-2xl font-bold text-slate-600 hover:border-blue-200 hover:bg-blue-50 transition">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkAnswer(i) {
            if(i === questions[qIdx].c) score++;
            qIdx++;
            renderQuiz();
        }

        window.onload = initApp;
    </script>
</body>
</html>
